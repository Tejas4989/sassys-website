name = "sassys"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[observability]
enabled = true

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "9cd5029834ee4636bcf6ef3e29e7a182"

[triggers]
crons = [
  # Nightly backup at 03:00 UTC (10pm ET / 11pm ET depending on DST)
  "0 3 * * *",
  # Free-tier monitoring at 07:00 UTC daily
  "0 7 * * *",
]

# CRON_SECRET — set via: wrangler secret put CRON_SECRET

[[r2_buckets]]
binding = "R2"
bucket_name = "sassys-media"

[vars]
NEXT_PUBLIC_APP_URL = "https://mysassys.com"

# Secrets (set via: wrangler secret put <NAME>)
# DATABASE_URL          — Neon connection string
# AUTH_SECRET           — Auth.js secret (openssl rand -base64 32)
# RESEND_API_KEY        — Resend API key
# CLOVER_MERCHANT_ID    — Clover merchant ID
# CLOVER_API_KEY        — Clover API key
# CLOVER_WEBHOOK_SECRET — Clover webhook HMAC secret
# VAPID_PUBLIC_KEY      — Web Push VAPID public key (generate: npx web-push generate-vapid-keys)
# VAPID_PRIVATE_KEY     — Web Push VAPID private key
# NEXT_PUBLIC_VAPID_PUBLIC_KEY — same as VAPID_PUBLIC_KEY, exposed to browser
# CRON_SECRET           — random secret to protect /api/cron/* endpoints
# R2_ACCOUNT_ID         — Cloudflare account ID for R2 presigned URLs
# R2_ACCESS_KEY_ID      — R2 access key ID
# R2_SECRET_ACCESS_KEY  — R2 secret access key

[env.staging]
name = "sassys-staging"
[env.staging.vars]
NEXT_PUBLIC_APP_URL = "https://v2.mysassys.com"
